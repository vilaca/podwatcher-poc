# validate kube-system
# in namespace kube-system only pods from docker.io and registry.k8s.io are allowed
name: kube-system namespace safety
enabled: false
severity: high
filter:
  namespace:
    include:
      - kube-system
rule: >
  !{'registry.k8s.io', 'docker.io', 'ghcr.io'}.contains(container.image.registry)

alert: registry alert
